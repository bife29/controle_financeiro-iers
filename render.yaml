# Deploy configuration for Render.com (free tier)
services:
  - type: web
    name: iers-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: iers-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://iers-sistema.vercel.app

databases:
  - name: iers-db
    plan: free
    databaseName: iers_db
