app = "iers-api"
primary_region = "gru"

[build]
  dockerfile = "Dockerfile"

[env]
  ALGORITHM = "HS256"
  ACCESS_TOKEN_EXPIRE_MINUTES = "480"
  APP_NAME = "IERS Sistema Integrado"
  APP_VERSION = "2.0.0"
  DEBUG = "False"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/health"
  timeout = "5s"
